<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETLOVER24 - PRO SLOT</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; height: 100vh; }
        .header { width: 100%; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; border-bottom: 2px solid #f1c40f; box-sizing: border-box; }
        .brand .name { color: #00e6ff; font-weight: 900; font-size: 20px; }
        .brand .game { color: #ff4d4d; font-weight: bold; font-size: 13px; }
        .balance-box { background: linear-gradient(145deg, #27ae60, #2ecc71); padding: 6px 18px; border-radius: 30px; font-weight: bold; font-size: 18px; }
        .slot-machine { margin-top: 15px; display: grid; grid-template-columns: repeat(3, 85px); grid-template-rows: repeat(4, 85px); gap: 10px; background: #222; padding: 12px; border: 4px solid #f1c40f; border-radius: 18px; }
        .reel { width: 85px; height: 85px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 10px; position: relative; }
        .reel img { width: 80%; height: 80%; object-fit: contain; position: absolute; }
        .scrolling img { animation: scrollDown 0.12s infinite linear; }
        @keyframes scrollDown { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .footer-controls { position: fixed; bottom: 20px; width: 92%; display: flex; justify-content: space-between; align-items: center; background: rgba(20,20,20,0.95); padding: 12px 15px; border-radius: 60px; border: 1px solid #333; }
        .bet-group { display: flex; align-items: center; background: #333; padding: 6px 16px; border-radius: 30px; gap: 15px; }
        .play-btn { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(#ff4d4d, #b30000); border: 4px solid #fff; color: white; font-weight: 900; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px #000; }
        .play-btn:active { transform: translateY(3px); box-shadow: 0 2px #000; }
        .play-btn:disabled { opacity: 0.5; filter: grayscale(1); }
        .btn-icon { background: #444; border: none; color: white; width: 42px; height: 42px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; }
                /* বিজয়ী ছবির হাইলাইট ইফেক্ট */
        .win-highlight {
            border: 3px solid #f1c40f !important;
            box-shadow: 0 0 20px #f1c40f !important;
            transform: scale(1.1);
            z-index: 10;
            background: #fff !important;
            transition: 0.3s;
        }

        /* না জেতা ছবিগুলো ঝাপসা হবে */
        .dim-effect {
            opacity: 0.3;
            filter: grayscale(0.8);
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

    </style>
</head>
<body>
<div id="win-overlay" style="display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: #f1c40f; padding: 15px 30px; border-radius: 50px; font-size: 28px; font-weight: bold; border: 3px solid #f1c40f; z-index: 999; text-align: center; box-shadow: 0 0 20px #f1c40f; animation: popIn 0.3s ease-out;">🎉 WINNER! <br>৳<span id="win-amount">0</span></div>

    <div class="header">
        <div class="brand">
            <div class="name">BETLOVER24</div>
            <div class="game">LUCKY 777</div>
        </div>
        <div class="balance-box">৳ <span id="balance">10000</span></div>
    </div>

    <div class="slot-machine" id="machine"></div>

    <div class="footer-controls">
        <div class="bet-group">
            <button onclick="changeBet(-5)" style="color:#fff; border:none; background:none; font-size:24px;">-</button>
            <span id="current-bet" style="color:#f1c40f; font-weight:bold; font-size:20px;">15</span>
            <button onclick="changeBet(5)" style="color:#fff; border:none; background:none; font-size:24px;">+</button>
        </div>

        <button class="play-btn" id="btn" onclick="spin()">SPIN</button>

        <div style="display:flex; gap:10px;">
            <button class="btn-icon" id="sound-btn" onclick="toggleSound()">🔊</button>
            <button class="btn-icon" id="turbo-btn" onclick="toggleTurbo()" style="color:#f1c40f;">⚡</button>
        </div>
    </div>

    <script>
        const socket = io();
        let balance = parseInt(localStorage.getItem('slot_balance')) || 10000;
        let currentBet = 15;
        let isTurbo = false;
        let soundOn = true;
        const machine = document.getElementById('machine');
        
        // ৪টি সাউন্ড ফাইল লোড করা
        const sndClick = new Audio('click.mp3');
        const sndSpin = new Audio('spin.mp3');
        const sndWin = new Audio('win.mp3');
        const sndBigWin = new Audio('bigwin.mp3');

        for (let i = 0; i < 12; i++) { machine.innerHTML += `<div id="slot-${i}" class="reel"></div>`; }
        const images = ['apple.png', 'banana.png', 'coin.png', 'dollar.png', 'seven.png', 'begun.png', 'jambura.png', 'rose.png', 'beer-bottle.png', 'water-bottle.png'];

        window.onload = () => {
            for (let i = 0; i < 12; i++) { document.getElementById(`slot-${i}`).innerHTML = `<img src="${images[Math.floor(Math.random()*images.length)]}">`; }
            updateUI();
        };

        function changeBet(val) { if (currentBet + val >= 5) { currentBet += val; document.getElementById('current-bet').innerText = currentBet; } }
        function toggleTurbo() { isTurbo = !isTurbo; document.getElementById('turbo-btn').style.background = isTurbo ? '#600' : '#444'; }
        function toggleSound() { soundOn = !soundOn; document.getElementById('sound-btn').innerText = soundOn ? '🔊' : '🔇'; }

        function spin() {
            if (balance < currentBet) return alert("ব্যালেন্স নেই!");
            balance -= currentBet; updateUI();
            
            // ১. ক্লিক সাউন্ড
            if(soundOn) sndClick.play().catch(()=>{});
            // ২. স্পিন সাউন্ড (লুপ হবে যতক্ষণ রেজাল্ট না আসে)
            if(soundOn) { sndSpin.loop = true; sndSpin.play().catch(()=>{}); }

            for (let i = 0; i < 12; i++) { document.getElementById(`slot-${i}`).classList.add('scrolling'); }
            document.getElementById('btn').disabled = true;
            socket.emit('request-spin', { bet: currentBet });
        }

                socket.on('receive-spin', (data) => {
            const delay = isTurbo ? 600 : 1500;
            setTimeout(() => {
                if(soundOn) { sndSpin.pause(); sndSpin.currentTime = 0; }
                
                let cellIndex = 0;
                data.grid.forEach(row => {
                    row.forEach(imgName => {
                        const reel = document.getElementById(`slot-${cellIndex}`);
                        // সব ইফেক্ট ক্লিয়ার করা
                        reel.classList.remove('scrolling', 'win-highlight', 'dim-effect');
                        reel.innerHTML = `<img src="${imgName}">`;
                        
                        // ১. উইনিং হাইলাইট লজিক
                        if (data.win) {
                            const count = data.grid.flat().filter(i => i === imgName).length;
                            if (count >= 3) {
                                reel.classList.add('win-highlight');
                            } else {
                                reel.classList.add('dim-effect');
                            }
                        }
                        cellIndex++;
                    });
                });

                // ২. নতুন উইন মেসেজ অ্যানিমেশন (অ্যালার্ট ছাড়া)
                if (data.win) {
                    balance += data.prize;
                    if(soundOn) {
                        if(data.prize >= currentBet * 10) sndBigWin.play().catch(()=>{});
                        else sndWin.play().catch(()=>{});
                    }

                    // স্ক্রিনের মাঝখানে গোল্ডেন মেসেজ দেখানো
                    const overlay = document.getElementById('win-overlay');
                    const amountSpan = document.getElementById('win-amount');
                    if(overlay && amountSpan) {
                        amountSpan.innerText = data.prize;
                        overlay.style.display = 'block';
                        // ২.৫ সেকেন্ড পর মেসেজটি চলে যাবে
                        setTimeout(() => { overlay.style.display = 'none'; }, 2500);
                    }
                }
                
                document.getElementById('btn').disabled = false;
                updateUI();
            }, delay);
        });

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            localStorage.setItem('slot_balance', balance);
        }
    </script>
</body>
</html>
