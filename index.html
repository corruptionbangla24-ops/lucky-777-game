<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETLOVER24 - PRO SLOT MASTER</title>
    <!-- সকেট লাইব্রেরি সরাসরি CDN থেকে নিন -->
<script src="https://socket.io"></script>

<script>
    // আপনার রেন্ডার গেম সার্ভারের লিঙ্কটি এখানে দিন
    const socket = io("https://lucky-777-game-1.onrender.com/"); 
    
    socket.on('connect', () => {
        console.log("Connected to server!");
    });

    socket.on('connect_error', (err) => {
        console.error("Socket Error:", err.message);
    });
</script>

    <style>
        /* ১. মূল ডিজাইন ও ব্যাকগ্রাউন্ড */
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; overflow: hidden; }
        
        /* ২. হেডার ও ব্যালেন্স সেকশন */
        .header { width: 100%; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; border-bottom: 2px solid #f1c40f; box-sizing: border-box; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .brand .name { color: #00e6ff; font-weight: 900; font-size: 19px; letter-spacing: 1px; }
        .brand .game { color: #ff4d4d; font-weight: bold; font-size: 12px; }
        .balance-box { background: linear-gradient(145deg, #27ae60, #2ecc71); padding: 6px 16px; border-radius: 30px; font-weight: bold; font-size: 17px; border: 1px solid #ffffff33; }

        /* ৩. ৩x৪ স্লট মেশিন গ্রিড (বোর্ড উপরে তোলা হয়েছে) */
        .slot-machine { margin-top: 10px; display: grid; grid-template-columns: repeat(3, 85px); grid-template-rows: repeat(4, 85px); gap: 10px; background: #222; padding: 12px; border: 4px solid #f1c40f; border-radius: 18px; box-shadow: 0 0 30px rgba(241,196,15,0.2); }
        .reel { width: 85px; height: 85px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 10px; border: 1px solid #444; position: relative; }
        .reel img { width: 80%; height: 80%; object-fit: contain; position: absolute; }
        
        /* ৪. এনিমেশন লজিক */
        .scrolling img { animation: scrollDown 0.12s infinite linear; }
        .turbo-mode img { animation: scrollDown 0.06s infinite linear; }
        @keyframes scrollDown { 0% { transform: translateY(-100%); opacity: 0.5; } 100% { transform: translateY(100%); opacity: 1; } }

        /* ৫. উইনিং ইফেক্ট (গোল্ডেন হাইলাইট ও ডিম) */
        .win-highlight { border: 4px solid #f1c40f !important; box-shadow: 0 0 25px #f1c40f !important; transform: scale(1.05); z-index: 10; background: #fff !important; }
        .dim-effect { opacity: 0.25; filter: grayscale(1); }
        
        /* ৬. কাস্টম উইন ওভারলে (সাদা বক্সের বিকল্প) */
        #win-overlay { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: #f1c40f; padding: 25px 45px; border-radius: 60px; font-size: 32px; font-weight: 900; border: 4px solid #f1c40f; z-index: 999; text-align: center; box-shadow: 0 0 40px #f1c40f; animation: popIn 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* ৭. কন্ট্রোল প্যানেল (নিচে সেট করা) */
        .footer-controls { position: fixed; bottom: 8px; width: 94%; background: rgba(15,15,15,0.98); padding: 12px; border-radius: 35px; display: flex; flex-direction: column; align-items: center; gap: 12px; border: 1px solid #333; box-shadow: 0 -5px 25px rgba(0,0,0,0.8); }
        
        .quick-bets { display: flex; gap: 10px; justify-content: center; width: 100%; }
        .q-btn { background: #333; color: #bbb; border: 1px solid #444; padding: 7px 16px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .q-btn.active-bet { background: #f1c40f; color: #000; border-color: #fff; box-shadow: 0 0 12px #f1c40f; }

        .play-section { display: flex; align-items: center; gap: 15px; width: 100%; justify-content: space-between; padding: 0 10px; box-sizing: border-box; }
        .bet-selector { display: flex; align-items: center; background: #222; padding: 6px 18px; border-radius: 30px; gap: 12px; border: 1px solid #444; }
        .bet-btn-nav { color: #fff; border: none; background: none; font-size: 26px; font-weight: bold; cursor: pointer; }
        
        .play-btn { width: 82px; height: 82px; border-radius: 50%; background: radial-gradient(#ff4d4d, #b30000); border: 4px solid #fff; color: white; font-weight: 900; font-size: 17px; cursor: pointer; box-shadow: 0 5px #000; display: flex; align-items: center; justify-content: center; }
        .play-btn:active { transform: translateY(3px); box-shadow: 0 2px #000; }
        .play-btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        .icon-group { display: flex; gap: 12px; }
        .icon-btn { background: #333; border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; font-size: 19px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-btn.active { background: #600; color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
    </style>
</head>
<body>

    <!-- বিজয়ী মেসেজ ওভারলে -->
    <div id="win-overlay">🎉 WINNER!<br>৳<span id="win-amount">0</span></div>

    <!-- লোগো ও ব্যালেন্স হেডার -->
    <div class="header">
        <div class="brand">
            <div class="name">BETLOVER24</div>
            <div class="game">LUCKY 777</div>
        </div>
        <div class="balance-box">৳ <span id="balance">10000</span></div>
    </div>

    <!-- ৩x৪ স্লট বোর্ড -->
    <div class="slot-machine" id="machine"></div>

    <!-- কন্ট্রোল প্যানেল -->
    <div class="footer-controls">
        <!-- ১০, ২০, ৫০, ১০০ কুইক বাটন -->
        <div class="quick-bets">
            <button class="q-btn" onclick="setBet(10, this)">10</button>
            <button class="q-btn" onclick="setBet(20, this)">20</button>
            <button class="q-btn" onclick="setBet(50, this)">50</button>
            <button class="q-btn active-bet" onclick="setBet(100, this)">100</button>
        </div>

        <div class="play-section">
            <div class="bet-selector">
                <button class="bet-btn-nav" onclick="changeBet(-5)">-</button>
                <span id="current-bet" style="font-size:22px; font-weight:bold; min-width:45px; text-align:center; color:#f1c40f;">100</span>
                <button class="bet-btn-nav" onclick="changeBet(5)">+</button>
            </div>
            
            <button class="play-btn" id="btn" onclick="spin()">SPIN</button>
            
            <div class="icon-group">
                <button class="icon-btn" id="sound-btn" onclick="toggleSound()">🔊</button>
                <button class="icon-btn" id="turbo-btn" onclick="toggleTurbo()">⚡</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let balance = parseInt(localStorage.getItem('slot_balance')) || 10000;
        let currentBet = 100;
        let isTurbo = false;
        let soundOn = true;
        const machine = document.getElementById('machine');
        
        // ৪টি সাউন্ড ফাইল লোড করা
        const sndClick = new Audio('click.mp3');
        const sndSpin = new Audio('spin.mp3');
        const sndWin = new Audio('win.mp3');
        const sndBigWin = new Audio('bigwin.mp3');

        // বোর্ড তৈরি
        for (let i = 0; i < 12; i++) { machine.innerHTML += `<div id="slot-${i}" class="reel"></div>`; }
        const images = ['apple.png', 'banana.png', 'coin.png', 'dollar.png', 'seven.png', 'begun.png', 'jambura.png', 'rose.png', 'beer-bottle.png', 'water-bottle.png'];

        window.onload = () => {
            for (let i = 0; i < 12; i++) { 
                document.getElementById(`slot-${i}`).innerHTML = `<img src="${images[Math.floor(Math.random()*images.length)]}">`; 
            }
            updateUI();
        };

        function setBet(val, btn) {
            currentBet = val;
            document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active-bet'));
            btn.classList.add('active-bet');
            if(soundOn) sndClick.play().catch(()=>{});
            updateUI();
        }

        function changeBet(v) {
            if(currentBet + v >= 5) {
                currentBet += v;
                document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active-bet'));
                updateUI();
            }
        }

        function toggleTurbo() {
            isTurbo = !isTurbo;
            document.getElementById('turbo-btn').classList.toggle('active');
        }

        function toggleSound() {
            soundOn = !soundOn;
            document.getElementById('sound-btn').innerText = soundOn ? '🔊' : '🔇';
        }

        function spin() {
            if (balance < currentBet) return alert("Balance Low!");
            balance -= currentBet; updateUI();
            
            if(soundOn) {
                sndClick.play().catch(()=>{});
                sndSpin.loop = true; sndSpin.play().catch(()=>{});
            }

            document.getElementById('win-overlay').style.display = 'none';
            for (let i = 0; i < 12; i++) { 
                const r = document.getElementById(`slot-${i}`);
                r.classList.remove('win-highlight', 'dim-effect');
                r.classList.add(isTurbo ? 'turbo-mode' : 'scrolling'); 
            }
            document.getElementById('btn').disabled = true;
            socket.emit('request-spin', { bet: currentBet });
        }

        socket.on('receive-spin', (data) => {
            const delay = isTurbo ? 600 : 1500;
            setTimeout(() => {
                if(soundOn) { sndSpin.pause(); sndSpin.currentTime = 0; }
                
                let idx = 0;
                data.grid.forEach(row => {
                    row.forEach(img => {
                        const r = document.getElementById(`slot-${idx}`);
                        r.classList.remove('scrolling', 'turbo-mode');
                        r.innerHTML = `<img src="${img}">`;
                        
                        // বিজয়ী ঘর হাইলাইট করা
                        if (data.win) {
                            if (img === data.winningImg) r.classList.add('win-highlight');
                            else r.classList.add('dim-effect');
                        }
                        idx++;
                    });
                });
                
                if (data.win) {
                    balance += data.prize;
                    if(soundOn) {
                        if(data.prize >= currentBet * 10) sndBigWin.play().catch(()=>{});
                        else sndWin.play().catch(()=>{});
                    }
                    document.getElementById('win-amount').innerText = data.prize;
                    document.getElementById('win-overlay').style.display = 'block';
                    setTimeout(() => { document.getElementById('win-overlay').style.display = 'none'; }, 2600);
                }
                document.getElementById('btn').disabled = false;
                updateUI();
            }, delay);
        });

        function updateUI() {
            document.getElementById('current-bet').innerText = currentBet;
            document.getElementById('balance').innerText = balance;
            localStorage.setItem('slot_balance', balance);
        }
    </script>
</body>
</html>
