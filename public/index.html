<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETLOVER24 - LUCKY 777</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* ১. ব্যাকগ্রাউন্ড ও পজিশন ফিক্স */
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        .header { width: 100%; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #111; border-bottom: 2px solid #f1c40f; box-sizing: border-box; }
        .brand .name { color: #00e6ff; font-weight: bold; font-size: 18px; }
        .brand .game { color: #ff4d4d; font-size: 11px; font-weight: bold; }
        .balance-box { background: #27ae60; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 16px; }

        /* ২. স্লট মেশিনের পজিশন (নিচের সারি ঠিক করা হয়েছে) */
        .slot-machine { margin-top: 10px; background: #222; border: 4px solid #f1c40f; border-radius: 15px; padding: 10px; box-shadow: 0 0 20px rgba(241,196,15,0.2); }
        .grid { display: grid; grid-template-columns: repeat(3, 80px); grid-template-rows: repeat(4, 80px); gap: 8px; }
        .reel { width: 80px; height: 80px; background: #fff; display: flex; align-items: center; justify-content: center; border-radius: 8px; overflow: hidden; position: relative; }
        .reel img { width: 80%; height: 80%; object-fit: contain; }
        
        /* ৩. এনিমেশন ও হাইলাইট */
        .scrolling img { animation: scrollDown 0.12s infinite linear; }
        .turbo-mode img { animation: scrollDown 0.06s infinite linear; }
        @keyframes scrollDown { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .win-highlight { border: 3px solid #f1c40f !important; box-shadow: 0 0 15px #f1c40f; transform: scale(1.05); z-index: 5; background: #fff !important; }
        .dim-effect { opacity: 0.3; filter: grayscale(1); }

        /* ৪. কন্ট্রোল প্যানেল */
        .footer-controls { margin-top: 15px; background: rgba(34,34,34,0.9); padding: 15px; border-radius: 25px; width: 90%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .quick-bets { display: flex; gap: 8px; }
        .q-btn { background: #333; color: #fff; border: 1px solid #555; padding: 6px 12px; border-radius: 10px; cursor: pointer; }
        .active-bet { background: #f1c40f !important; color: #000 !important; }

        .play-row { display: flex; align-items: center; gap: 20px; width: 100%; justify-content: space-around; }
        .spin-btn { width: 75px; height: 75px; border-radius: 50%; background: red; color: white; border: 4px solid #fff; font-weight: bold; cursor: pointer; font-size: 16px; }
        .icon-btn { background: #444; border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        .turbo-active { background: #f1c40f !important; color: #000 !important; box-shadow: 0 0 10px #f1c40f; }

        #win-overlay { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); color: #f1c40f; padding: 20px 40px; border-radius: 50px; font-size: 28px; font-weight: bold; border: 3px solid #f1c40f; z-index: 100; text-align: center; animation: popIn 0.3s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="win-overlay">🎉 WINNER!<br>৳<span id="win-amount">0</span></div>

    <div class="header">
        <div class="brand"><div class="name">BETLOVER24</div><div class="game">LUCKY 777</div></div>
        <div class="balance-box">৳ <span id="balance">2452088</span></div>
    </div>

    <div class="slot-machine">
        <div class="grid" id="slot-grid">
            <!-- জাভাস্ক্রিপ্ট ১২টি ঘর তৈরি করবে -->
        </div>
    </div>

    <div class="footer-controls">
        <div class="quick-bets">
            <button class="q-btn" onclick="setBet(10, this)">10</button>
            <button class="q-btn" onclick="setBet(20, this)">20</button>
            <button class="q-btn" onclick="setBet(50, this)">50</button>
            <button class="q-btn active-bet" onclick="setBet(100, this)">100</button>
        </div>

        <div class="play-row">
            <div style="background:#111; padding:5px 15px; border-radius:20px; color:#f1c40f; font-weight:bold; font-size:20px;">
                <button onclick="changeBet(-10)" style="background:none; border:none; color:#fff; font-size:20px;">-</button>
                <span id="current-bet">100</span>
                <button onclick="changeBet(10)" style="background:none; border:none; color:#fff; font-size:20px;">+</button>
            </div>
            
            <button class="spin-btn" id="btn" onclick="spin()">SPIN</button>
            
            <div style="display:flex; gap:10px;">
                <button class="icon-btn" id="sound-btn" onclick="toggleSound()">🔊</button>
                <button class="icon-btn" id="turbo-btn" onclick="toggleTurbo()">⚡</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let balance = 2452088;
        let currentBet = 100;
        let isTurbo = false;
        let soundOn = true;

        const grid = document.getElementById('slot-grid');
        for(let i=0; i<12; i++) { grid.innerHTML += `<div id="slot-${i}" class="reel"><img src="seven.png"></div>`; }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('current-bet').innerText = currentBet;
        }

        function setBet(v, btn) {
            currentBet = v;
            document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active-bet'));
            btn.classList.add('active-bet');
            updateUI();
        }

        function changeBet(v) { if(currentBet + v > 0) currentBet += v; updateUI(); }

        function toggleTurbo() {
            isTurbo = !isTurbo;
            document.getElementById('turbo-btn').classList.toggle('turbo-active');
        }

        function toggleSound() {
            soundOn = !soundOn;
            document.getElementById('sound-btn').innerText = soundOn ? "🔊" : "🔇";
        }

        function spin() {
            if (balance < currentBet) return alert("Balance Low!");
            balance -= currentBet;
            updateUI();
            document.getElementById('btn').disabled = true;
            for(let i=0; i<12; i++) {
                document.getElementById(`slot-${i}`).classList.remove('win-highlight', 'dim-effect');
                document.getElementById(`slot-${i}`).classList.add(isTurbo ? 'turbo-mode' : 'scrolling');
            }
            socket.emit('request-spin', { bet: currentBet });
        }

        socket.on('receive-spin', (data) => {
            const delay = isTurbo ? 600 : 1500;
            setTimeout(() => {
                let idx = 0;
                data.grid.forEach(row => {
                    row.forEach(img => {
                        const reel = document.getElementById(`slot-${idx}`);
                        reel.classList.remove('scrolling', 'turbo-mode');
                        reel.innerHTML = `<img src="${img}">`;
                        if (data.win) {
                            if (img === data.winningImg) reel.classList.add('win-highlight');
                            else reel.classList.add('dim-effect');
                        }
                        idx++;
                    });
                });

                if (data.win) {
                    balance += data.prize;
                    document.getElementById('win-amount').innerText = data.prize;
                    document.getElementById('win-overlay').style.display = 'block';
                    setTimeout(() => { document.getElementById('win-overlay').style.display = 'none'; }, 2500);
                }
                document.getElementById('btn').disabled = false;
                updateUI();
            }, delay);
        });
    </script>
</body>
</html>
