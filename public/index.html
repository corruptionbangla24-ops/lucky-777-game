<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETLOVER24 - MASTER SLOT</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0b0b; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        .header { width: 100%; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; border-bottom: 2px solid #f1c40f; box-sizing: border-box; }
        .brand .name { color: #00e6ff; font-weight: 900; font-size: 18px; }
        .balance-box { background: linear-gradient(145deg, #27ae60, #2ecc71); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 16px; border: 1px solid #fff3; }

        .slot-machine { margin-top: 10px; display: grid; grid-template-columns: repeat(3, 85px); grid-template-rows: repeat(4, 85px); gap: 8px; background: #222; padding: 10px; border: 4px solid #f1c40f; border-radius: 15px; box-shadow: 0 0 25px rgba(241,196,15,0.3); }
        .reel { width: 85px; height: 85px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 8px; position: relative; }
        .reel img { width: 80%; height: 80%; object-fit: contain; }
        
        .scrolling img { animation: scrollDown 0.12s infinite linear; }
        .turbo-mode img { animation: scrollDown 0.06s infinite linear; }
        @keyframes scrollDown { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        .win-highlight { border: 4px solid #f1c40f !important; box-shadow: 0 0 20px #f1c40f !important; transform: scale(1.05); z-index: 10; background: #fff !important; }
        .dim-effect { opacity: 0.25; filter: grayscale(1); }
        
        #win-overlay { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); color: #f1c40f; padding: 20px 40px; border-radius: 50px; font-size: 30px; font-weight: bold; border: 3px solid #f1c40f; z-index: 999; text-align: center; box-shadow: 0 0 40px #f1c40f; animation: popIn 0.3s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .footer-controls { position: fixed; bottom: 8px; width: 94%; background: rgba(20,20,20,0.95); padding: 12px; border-radius: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px; border: 1px solid #333; }
        .quick-bets { display: flex; gap: 8px; }
        .q-btn { background: #333; color: #fff; border: 1px solid #444; padding: 6px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .active-bet { background: #f1c40f !important; color: #000 !important; }

        .play-row { display: flex; align-items: center; gap: 15px; width: 100%; justify-content: space-between; padding: 0 10px; box-sizing: border-box; }
        .play-btn { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(#ff4d4d, #b30000); border: 4px solid #fff; color: white; font-weight: 900; cursor: pointer; }
        .icon-btn { background: #333; border: none; color: #fff; width: 42px; height: 42px; border-radius: 50%; font-size: 18px; cursor: pointer; }
        .active-icon { background: #600 !important; color: #f1c40f !important; box-shadow: 0 0 10px #f1c40f; }
    </style>
</head>
<body>

    <div id="win-overlay">🎉 WINNER!<br>৳<span id="win-amount">0</span></div>

    <div class="header">
        <div class="brand"><div class="name">BETLOVER24</div><small style="color:red;">PRO SLOT</small></div>
        <div class="balance-box">৳ <span id="balance">10000</span></div>
    </div>

    <div class="slot-machine" id="machine"></div>

    <div class="footer-controls">
        <div class="quick-bets">
            <button class="q-btn" onclick="setBet(10, this)">10</button>
            <button class="q-btn" onclick="setBet(20, this)">20</button>
            <button class="q-btn" onclick="setBet(50, this)">50</button>
            <button class="q-btn active-bet" onclick="setBet(100, this)">100</button>
        </div>
        <div class="play-row">
            <div style="background:#222; padding:5px 15px; border-radius:20px; display:flex; gap:12px; border:1px solid #444;">
                <button onclick="changeBet(-5)" style="color:#fff; border:none; background:none; font-size:24px;">-</button>
                <span id="current-bet" style="font-size:22px; font-weight:bold; color:#f1c40f;">100</span>
                <button onclick="changeBet(5)" style="color:#fff; border:none; background:none; font-size:24px;">+</button>
            </div>
            <button class="play-btn" id="btn" onclick="spin()">SPIN</button>
            <div style="display:flex; gap:10px;">
                <button class="icon-btn" id="sound-btn" onclick="toggleSound()">🔊</button>
                <button class="icon-btn" id="turbo-btn" onclick="toggleTurbo()">⚡</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let balance = 10000; let currentBet = 100; let isTurbo = false; let soundOn = true;
        const sndClick = new Audio('click.mp3'); const sndSpin = new Audio('spin.mp3');
        const sndWin = new Audio('win.mp3'); const sndBigWin = new Audio('bigwin.mp3');

        const machine = document.getElementById('machine');
        for (let i = 0; i < 12; i++) { machine.innerHTML += `<div id="slot-${i}" class="reel"></div>`; }
        const images = ['apple.png', 'banana.png', 'coin.png', 'dollar.png', 'seven.png', 'begun.png', 'jambura.png', 'rose.png', 'beer-bottle.png', 'water-bottle.png'];

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('current-bet').innerText = currentBet;
        }

        window.onload = () => {
            for (let i = 0; i < 12; i++) { 
                document.getElementById(`slot-${i}`).innerHTML = `<img src="${images[Math.floor(Math.random()*images.length)]}">`; 
            }
            updateUI();
        };

        function setBet(v, btn) {
            currentBet = v;
            document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active-bet'));
            btn.classList.add('active-bet');
            if(soundOn) sndClick.play().catch(()=>{});
            updateUI();
        }

        function changeBet(v) { if(currentBet + v >= 5) currentBet += v; updateUI(); }
        function toggleTurbo() { isTurbo = !isTurbo; document.getElementById('turbo-btn').classList.toggle('active-icon'); }
        function toggleSound() { soundOn = !soundOn; document.getElementById('sound-btn').innerText = soundOn ? '🔊' : '🔇'; }

        function spin() {
            if (balance < currentBet) return alert("ব্যালেন্স নেই!");
            balance -= currentBet; updateUI();
            if(soundOn) { sndClick.play().catch(()=>{}); sndSpin.play().catch(()=>{}); }
            document.getElementById('btn').disabled = true;
            for (let i = 0; i < 12; i++) {
                const r = document.getElementById(`slot-${i}`);
                r.classList.remove('win-highlight', 'dim-effect');
                r.classList.add(isTurbo ? 'turbo-mode' : 'scrolling');
            }
            socket.emit('request-spin', { bet: currentBet });
        }

        socket.on('receive-spin', (data) => {
            const delay = isTurbo ? 600 : 1500;
            setTimeout(() => {
                if(soundOn) { sndSpin.pause(); sndSpin.currentTime = 0; }
                let idx = 0;
                data.grid.forEach(row => {
                    row.forEach(img => {
                        const r = document.getElementById(`slot-${idx}`);
                        r.classList.remove('scrolling', 'turbo-mode');
                        r.innerHTML = `<img src="${img}">`;
                        if (data.win) {
                            if (img === data.winningImg || data.grid.flat().filter(x => x === img).length >= 3) r.classList.add('win-highlight');
                            else r.classList.add('dim-effect');
                        }
                        idx++;
                    });
                });
                if (data.win) {
                    balance += data.prize;
                    if(soundOn) (data.prize >= currentBet * 10 ? sndBigWin : sndWin).play().catch(()=>{});
                    document.getElementById('win-amount').innerText = data.prize;
                    document.getElementById('win-overlay').style.display = 'block';
                    setTimeout(() => { document.getElementById('win-overlay').style.display = 'none'; }, 2500);
                }
                document.getElementById('btn').disabled = false; updateUI();
            }, delay);
        });
    </script>
</body>
</html>
